# ============================================================
#  vhost для aura-models.org — ставится в edge-nginx (Shift-Hub).
#  Скопировать на сервере в:  Shift-Hub/nginx/conf.d/aura-models.org.conf
#  Сертификаты (Cloudflare Origin) положить в:
#      Shift-Hub/nginx/ssl/aura-models.org/origin.pem
#      Shift-Hub/nginx/ssl/aura-models.org/origin.key
#  (папка ./nginx/ssl смонтирована в контейнер как /etc/letsencrypt)
# ============================================================

# HTTP -> HTTPS (на случай прямого обращения к origin по 80)
server {
    listen 80;
    server_name aura-models.org www.aura-models.org;
    return 301 https://aura-models.org$request_uri;
}

# www -> apex (на HTTPS)
server {
    listen 443 ssl;
    server_name www.aura-models.org;

    ssl_certificate     /etc/letsencrypt/aura-models.org/origin.pem;
    ssl_certificate_key /etc/letsencrypt/aura-models.org/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://aura-models.org$request_uri;
}

# Основной сайт
server {
    listen 443 ssl;
    server_name aura-models.org;

    # Cloudflare Origin Certificate (доверяет только Cloudflare — домен ДОЛЖЕН
    # идти через CF, оранжевое облако). Режим SSL/TLS в CF: Full (strict).
    ssl_certificate     /etc/letsencrypt/aura-models.org/origin.pem;
    ssl_certificate_key /etc/letsencrypt/aura-models.org/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Docker DNS — чтобы резолвить имя контейнера `aura` в рантайме
    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        # Переменная в upstream => nginx стартует, даже если контейнер aura
        # временно недоступен, и заново резолвит имя через Docker DNS.
        set $aura_upstream http://aura:80;
        proxy_pass $aura_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
