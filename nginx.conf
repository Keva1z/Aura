# Конфиг nginx ВНУТРИ контейнера aura — отдаёт статический сайт.
# Внешний (edge) nginx из Shift-Hub проксирует сюда по сети `web`.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip для текстовых ресурсов
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Хэшированные ассеты Vite (/assets/...) — кэшируем максимально долго
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Фото моделей и прочие картинки из public/ — кэшируем на месяц
    location /images/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # index.html никогда не кэшируем — чтобы новый билд подхватывался сразу
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Отдаём файл, если он есть, иначе index.html (на сайте только якоря — безопасно)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
